<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d1117" />
<title>QS Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --bg-panel: #161b22;
    --bg-panel-2: #1c2128;
    --border: #30363d;
    --border-bright: #484f58;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-faint: #6e7681;
    --accent: #ffd166;
    --accent-2: #5ec46c;
    --danger: #f85149;
    --warn: #d29922;
    --info: #58a6ff;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    overscroll-behavior-y: contain;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 0%, rgba(94, 196, 108, 0.06), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(88, 166, 255, 0.05), transparent 50%);
    background-attachment: fixed;
    min-height: 100vh;
    padding: 16px 14px 80px;
    padding-top: env(safe-area-inset-top, 16px);
    padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* LOGIN GATE */
  #login-gate {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 20px;
  }
  #login-gate .card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  #login-gate h1 {
    font-family: 'VT323', monospace;
    font-size: 38px;
    color: var(--accent);
    margin: 0 0 6px;
    line-height: 1;
  }
  #login-gate h1 span { color: var(--text); }
  #login-gate p { color: var(--text-dim); font-size: 13px; margin: 0 0 22px; }
  #login-gate input {
    width: 100%;
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    margin-bottom: 12px;
  }
  #login-gate input:focus { outline: none; border-color: var(--accent); }
  #login-gate button {
    width: 100%;
    background: var(--accent);
    color: #0d1117;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
  }
  #login-error { color: var(--danger); font-size: 12px; margin-top: 10px; min-height: 16px; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .logo {
    font-family: 'VT323', monospace;
    font-size: 30px;
    color: var(--accent);
    line-height: 1;
  }
  .logo span { color: var(--text); }
  #refresh-btn {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    -webkit-appearance: none;
  }
  #refresh-btn:active { background: var(--bg-panel-2); }

  /* KPI CARDS - 2x2 grid op mobiel */
  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .kpi {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .kpi .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-faint);
  }
  .kpi .value {
    font-family: 'VT323', monospace;
    font-size: 30px;
    color: var(--text);
    line-height: 1.1;
    margin-top: 4px;
  }

  /* TABS */
  .tabs {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 8px 0 12px;
    margin: 0 -2px 12px;
    z-index: 5;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs-inner {
    display: flex;
    gap: 6px;
    padding: 0 2px;
    width: max-content;
  }
  .tab {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 9px 16px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    -webkit-appearance: none;
  }
  .tab.active {
    background: var(--accent);
    color: #0d1117;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* PANELS */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin: 0 0 12px;
  }

  /* TAB CONTENT - swipeable */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* CHART */
  .chart-wrap { position: relative; height: 200px; }

  /* LIST ROWS */
  .list-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    gap: 12px;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row .main { flex: 1; min-width: 0; }
  .list-row .main > div:first-child { color: var(--text); }
  .list-row .meta {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .list-row .amount {
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }

  /* COMPACT TABLE for mobile - rows instead of table */
  .compact-list .list-row {
    flex-wrap: wrap;
    gap: 4px 12px;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
  }
  .badge.dead { background: rgba(248, 81, 73, 0.15); color: var(--danger); }
  .badge.slow { background: rgba(210, 153, 34, 0.15); color: var(--warn); }
  .badge.hot { background: rgba(94, 196, 108, 0.15); color: var(--accent-2); }

  /* HEATMAP - smaller on mobile */
  .heatmap {
    display: grid;
    grid-template-columns: 32px repeat(24, 1fr);
    gap: 1.5px;
    font-size: 8px;
    color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
  }
  .heatmap .cell {
    aspect-ratio: 1;
    border-radius: 2px;
    background: rgba(255, 209, 102, 0.04);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }
  .empty-state .ascii {
    font-family: 'VT323', monospace;
    font-size: 56px;
    color: var(--accent);
    margin-bottom: 10px;
  }

  /* META BAR */
  .meta-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 14px;
    padding: 0 2px;
  }

  /* DESKTOP TWEAKS - subtle scaling, never abandons mobile feel */
  @media (min-width: 768px) {
    body { padding: 24px 28px 80px; }
    .container { max-width: 880px; }
    .logo { font-size: 36px; }
    .kpi-grid { grid-template-columns: repeat(4, 1fr); }
    .kpi .value { font-size: 36px; }
    .chart-wrap { height: 260px; }
    .heatmap { grid-template-columns: 40px repeat(24, 1fr); font-size: 10px; }
  }
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="login-gate">
  <div class="card">
    <h1>QS<span>·INSIGHTS</span></h1>
    <p>Enter password to view dashboard.</p>
    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
    <button onclick="checkPassword()">Unlock</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div class="container" id="app" style="display:none;">

  <header>
    <div class="logo">QS<span>·INSIGHTS</span></div>
    <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </header>

  <div class="meta-bar">
    <span id="dateRange">no data</span>
    <span id="lastUpdated">—</span>
  </div>

  <!-- KPIs always visible -->
  <div class="kpi-grid">
    <div class="kpi">
      <div class="label">Revenue</div>
      <div class="value" id="totalRev">$0</div>
    </div>
    <div class="kpi">
      <div class="label">Transactions</div>
      <div class="value" id="totalTx">0</div>
    </div>
    <div class="kpi">
      <div class="label">Buyers</div>
      <div class="value" id="totalBuyers">0</div>
    </div>
    <div class="kpi">
      <div class="label">Avg sale</div>
      <div class="value" id="avgSale">$0</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tabs-inner">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="items">Items</button>
      <button class="tab" data-tab="customers">Customers</button>
      <button class="tab" data-tab="activity">Activity</button>
      <button class="tab" data-tab="recent">Recent</button>
    </div>
  </div>

  <!-- TAB CONTENTS -->
  <main id="dashboard">
    <div class="panel">
      <div class="empty-state">
        <div class="ascii">[ ⛏ ]</div>
        <p>Loading shop history...</p>
      </div>
    </div>
  </main>

</div>

<script>
  // ===== AUTH =====
  const PASSWORD_HASH = "a9b7f5467f6907a926c3ced7fd0637c21c735bd50622fc18fa9b033bd09de5c9";

  async function sha256(text) {
    const buf = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash))
      .map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function checkPassword() {
    const input = document.getElementById('password-input').value;
    const errEl = document.getElementById('login-error');
    if (!input) { errEl.textContent = 'Enter a password.'; return; }
    const hash = await sha256(input);
    if (hash === PASSWORD_HASH) {
      sessionStorage.setItem('qs_unlocked', 'yes');
      unlock();
    } else {
      errEl.textContent = 'Wrong password.';
      document.getElementById('password-input').value = '';
    }
  }

  function unlock() {
    document.getElementById('login-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  }

  document.getElementById('password-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkPassword();
  });

  if (sessionStorage.getItem('qs_unlocked') === 'yes') {
    unlock();
  } else {
    document.getElementById('password-input').focus();
  }

  // ===== DATA LOADING =====
  let transactions = [];
  let charts = {};
  let activeTab = 'overview';

  async function loadData() {
    try {
      const resp = await fetch('transactions_archive.csv?t=' + Date.now());
      if (!resp.ok) throw new Error('Could not load transactions_archive.csv');
      const text = await resp.text();
      transactions = parseCSV(text);
      document.getElementById('lastUpdated').textContent = 'updated ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
      render();
    } catch (err) {
      document.getElementById('dashboard').innerHTML = `
        <div class="panel">
          <div class="empty-state">
            <div class="ascii">[ ! ]</div>
            <p>Could not load data.</p>
            <p style="font-size: 12px;">${err.message}</p>
            <p style="font-size: 11px; margin-top: 16px;">
              Make sure <code>transactions_archive.csv</code> is uploaded alongside this page.
            </p>
          </div>
        </div>`;
    }
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = parseCSVLine(lines[0]);
    return lines.slice(1).map(line => {
      const vals = parseCSVLine(line);
      const o = {};
      headers.forEach((h, i) => o[h.trim()] = vals[i] || '');
      return {
        time: o.time,
        buyer: o.buyer,
        item: o.item,
        qty: parseInt(o.quantity) || 1,
        net: parseFloat(o.net) || 0,
        shop: o.shop || 'unknown'
      };
    }).filter(t => t.time && t.buyer && t.item);
  }

  function parseCSVLine(line) {
    const result = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQuotes = !inQuotes; continue; }
      if (c === ',' && !inQuotes) { result.push(cur); cur = ''; continue; }
      cur += c;
    }
    result.push(cur);
    return result;
  }

  // ===== TAB SWITCHING =====
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === btn));
      document.querySelectorAll('.tab-content').forEach(c => {
        c.classList.toggle('active', c.dataset.tab === activeTab);
      });
      // Resize charts when becoming visible
      setTimeout(() => Object.values(charts).forEach(c => c?.resize?.()), 50);
    });
  });

  // SWIPE between tabs
  let touchStartX = 0;
  let touchStartY = 0;
  const tabOrder = ['overview', 'items', 'customers', 'activity', 'recent'];

  document.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!touchStartX) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    // Only horizontal swipes, not too vertical
    if (Math.abs(dx) > 60 && Math.abs(dy) < 50) {
      const idx = tabOrder.indexOf(activeTab);
      if (dx < 0 && idx < tabOrder.length - 1) {
        document.querySelector(`.tab[data-tab="${tabOrder[idx+1]}"]`).click();
      } else if (dx > 0 && idx > 0) {
        document.querySelector(`.tab[data-tab="${tabOrder[idx-1]}"]`).click();
      }
    }
    touchStartX = 0;
  }, { passive: true });

  // ===== RENDER =====
  function render() {
    const dash = document.getElementById('dashboard');
    document.getElementById('totalTx').textContent = transactions.length;
    document.getElementById('totalRev').textContent = '$' + transactions.reduce((s,t) => s+t.net, 0).toLocaleString(undefined, {maximumFractionDigits: 0});

    if (!transactions.length) {
      ['totalBuyers', 'avgSale'].forEach(id => document.getElementById(id).textContent = id === 'avgSale' ? '$0' : '0');
      document.getElementById('dateRange').textContent = 'no data';
      dash.innerHTML = `
        <div class="panel">
          <div class="empty-state">
            <div class="ascii">[ ⛏ ]</div>
            <p>No transactions yet.</p>
            <p style="font-size: 12px;">Run the local pipeline and upload transactions_archive.csv.</p>
          </div>
        </div>`;
      return;
    }

    const total = transactions.reduce((s,t) => s+t.net, 0);
    const buyers = new Set(transactions.map(t => t.buyer));
    const avg = total / transactions.length;
    document.getElementById('totalBuyers').textContent = buyers.size;
    document.getElementById('avgSale').textContent = '$' + avg.toLocaleString(undefined, {maximumFractionDigits: 0});

    const dates = transactions.map(t => new Date(t.time)).sort((a,b)=>a-b);
    const fmt = d => d.toISOString().slice(5,10);
    document.getElementById('dateRange').textContent = `${fmt(dates[0])} → ${fmt(dates[dates.length-1])}`;

    // Aggregations
    const byItem = {};
    transactions.forEach(t => {
      if (!byItem[t.item]) byItem[t.item] = { item: t.item, qty: 0, revenue: 0, count: 0, lastSale: 0 };
      byItem[t.item].qty += t.qty;
      byItem[t.item].revenue += t.net;
      byItem[t.item].count += 1;
      const ts = new Date(t.time).getTime();
      if (ts > byItem[t.item].lastSale) byItem[t.item].lastSale = ts;
    });
    const itemArr = Object.values(byItem).sort((a,b) => b.revenue - a.revenue);

    const byBuyer = {};
    transactions.forEach(t => {
      if (!byBuyer[t.buyer]) byBuyer[t.buyer] = { buyer: t.buyer, revenue: 0, count: 0 };
      byBuyer[t.buyer].revenue += t.net;
      byBuyer[t.buyer].count += 1;
    });
    const buyerArr = Object.values(byBuyer).sort((a,b) => b.revenue - a.revenue);

    const byShop = {};
    transactions.forEach(t => {
      if (!byShop[t.shop]) byShop[t.shop] = { shop: t.shop, revenue: 0, count: 0 };
      byShop[t.shop].revenue += t.net;
      byShop[t.shop].count += 1;
    });
    const shopArr = Object.values(byShop).sort((a,b) => b.revenue - a.revenue);

    const now = Date.now();
    const slowItems = itemArr.map(i => {
      const daysSince = Math.floor((now - i.lastSale) / 86400000);
      return { ...i, daysSince };
    }).sort((a,b) => b.daysSince - a.daysSince);

    const dailyRev = {};
    for (let i = 13; i >= 0; i--) {
      const d = new Date(now - i * 86400000);
      const key = d.toISOString().slice(0,10);
      dailyRev[key] = 0;
    }
    transactions.forEach(t => {
      const key = new Date(t.time).toISOString().slice(0,10);
      if (key in dailyRev) dailyRev[key] += t.net;
    });

    const hourly = Array(24).fill(0);
    transactions.forEach(t => { hourly[new Date(t.time).getHours()]++; });

    const heat = Array.from({length: 7}, () => Array(24).fill(0));
    transactions.forEach(t => {
      const d = new Date(t.time);
      heat[d.getDay()][d.getHours()]++;
    });

    // Render all tabs (display:none on inactive)
    dash.innerHTML = `
      <div class="tab-content active" data-tab="overview">
        <div class="panel">
          <h3 class="panel-title">Revenue · last 14 days</h3>
          <div class="chart-wrap"><canvas id="revChart"></canvas></div>
        </div>
        <div class="panel">
          <h3 class="panel-title">Shops</h3>
          ${shopArr.map(s => `
            <div class="list-row">
              <div class="main">
                <div>${s.shop}</div>
                <div class="meta">${s.count} transactions</div>
              </div>
              <div class="amount">$${s.revenue.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
            </div>`).join('')}
        </div>
      </div>

      <div class="tab-content" data-tab="items">
        <div class="panel">
          <h3 class="panel-title">Top items by revenue</h3>
          ${itemArr.slice(0,10).map(i => `
            <div class="list-row">
              <div class="main">
                <div>${i.item}</div>
                <div class="meta">${i.qty} sold · ${i.count} sales</div>
              </div>
              <div class="amount">$${i.revenue.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
            </div>`).join('')}
        </div>

        <div class="panel">
          <h3 class="panel-title">Underperformers</h3>
          <div class="compact-list">
            ${slowItems.slice(0, 10).map(i => {
              const status = i.daysSince > 21 ? 'dead' : i.daysSince > 7 ? 'slow' : 'hot';
              const label = status === 'dead' ? 'Remove' : status === 'slow' ? 'Drop price' : 'OK';
              return `<div class="list-row">
                <div class="main">
                  <div>${i.item}</div>
                  <div class="meta">${i.qty} sold · last ${i.daysSince}d ago</div>
                </div>
                <span class="badge ${status}">${label}</span>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>

      <div class="tab-content" data-tab="customers">
        <div class="panel">
          <h3 class="panel-title">Top customers</h3>
          ${buyerArr.map(b => `
            <div class="list-row">
              <div class="main">
                <div>${b.buyer}</div>
                <div class="meta">${b.count} purchases</div>
              </div>
              <div class="amount">$${b.revenue.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
            </div>`).join('')}
        </div>
      </div>

      <div class="tab-content" data-tab="activity">
        <div class="panel">
          <h3 class="panel-title">Sales by hour</h3>
          <div class="chart-wrap"><canvas id="hourChart"></canvas></div>
        </div>
        <div class="panel">
          <h3 class="panel-title">Day × hour heatmap</h3>
          <div id="heatmap" class="heatmap"></div>
          <p style="font-size:10px; color:var(--text-faint); margin: 10px 0 0; font-family: 'JetBrains Mono', monospace;">Darker = more sales</p>
        </div>
      </div>

      <div class="tab-content" data-tab="recent">
        <div class="panel">
          <h3 class="panel-title">Recent transactions</h3>
          ${[...transactions].sort((a,b)=>new Date(b.time)-new Date(a.time)).slice(0,30).map(t => `
            <div class="list-row">
              <div class="main">
                <div>${t.buyer} bought ${t.qty}× ${t.item}</div>
                <div class="meta">${formatRelativeDate(t.time)}</div>
              </div>
              <div class="amount">$${t.net.toLocaleString(undefined,{maximumFractionDigits:2})}</div>
            </div>`).join('')}
        </div>
      </div>
    `;

    // Re-bind tab clicks (innerHTML wiped them)
    Object.values(charts).forEach(c => c?.destroy?.());
    charts = {};

    charts.rev = new Chart(document.getElementById('revChart'), {
      type: 'line',
      data: {
        labels: Object.keys(dailyRev).map(k => k.slice(5)),
        datasets: [{
          data: Object.values(dailyRev),
          borderColor: '#ffd166',
          backgroundColor: 'rgba(255, 209, 102, 0.1)',
          fill: true, tension: 0.3, pointRadius: 2,
          pointBackgroundColor: '#ffd166',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#6e7681', font: { family: 'JetBrains Mono', size: 9 }, maxRotation: 0 }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y: { beginAtZero: true, ticks: { color: '#6e7681', font: { family: 'JetBrains Mono', size: 9 }, callback: v => '$' + v }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });

    charts.hour = new Chart(document.getElementById('hourChart'), {
      type: 'bar',
      data: {
        labels: Array.from({length:24}, (_,i)=>i),
        datasets: [{ data: hourly, backgroundColor: '#5ec46c', borderRadius: 2 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#6e7681', font: { family: 'JetBrains Mono', size: 9 } }, grid: { display: false } },
          y: { beginAtZero: true, ticks: { color: '#6e7681', font: { family: 'JetBrains Mono', size: 9 } }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });

    // Heatmap
    const heatmap = document.getElementById('heatmap');
    heatmap.innerHTML = '';
    const max = Math.max(1, ...heat.flat());
    heatmap.appendChild(document.createElement('div'));
    for (let h = 0; h < 24; h++) {
      const lbl = document.createElement('div');
      lbl.textContent = h % 4 === 0 ? h : '';
      lbl.style.textAlign = 'center';
      heatmap.appendChild(lbl);
    }
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    days.forEach((day, di) => {
      const lbl = document.createElement('div');
      lbl.textContent = day;
      lbl.style.alignSelf = 'center';
      lbl.style.fontSize = '9px';
      heatmap.appendChild(lbl);
      for (let h = 0; h < 24; h++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const v = heat[di][h];
        const alpha = v / max;
        cell.style.background = `rgba(255, 209, 102, ${0.04 + alpha * 0.85})`;
        cell.title = `${day} ${h}:00 — ${v}`;
        heatmap.appendChild(cell);
      }
    });
  }

  function formatRelativeDate(iso) {
    const d = new Date(iso);
    const days = Math.floor((Date.now() - d.getTime()) / 86400000);
    const time = d.toTimeString().slice(0,5);
    if (days === 0) return `today ${time}`;
    if (days === 1) return `yesterday ${time}`;
    if (days < 7) return `${days}d ago ${time}`;
    return d.toISOString().slice(0,10);
  }
</script>
</body>
</html>
