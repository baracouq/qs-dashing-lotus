<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d1117" />
<title>QS Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --bg-panel: #161b22;
    --bg-panel-2: #1c2128;
    --border: #30363d;
    --border-bright: #484f58;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-faint: #6e7681;
    --accent: #ffd166;
    --accent-2: #5ec46c;
    --danger: #f85149;
    --warn: #d29922;
    --info: #58a6ff;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    overscroll-behavior-y: contain;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 0%, rgba(94, 196, 108, 0.06), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(88, 166, 255, 0.05), transparent 50%);
    background-attachment: fixed;
    min-height: 100vh;
    padding: 16px 14px 80px;
    padding-top: env(safe-area-inset-top, 16px);
    padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .logo {
    font-family: 'VT323', monospace;
    font-size: 30px;
    color: var(--accent);
    line-height: 1;
  }
  .logo span { color: var(--text); }
  #refresh-btn {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    -webkit-appearance: none;
  }
  #refresh-btn:active { background: var(--bg-panel-2); }

  /* KPI CARDS */
  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .kpi {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .kpi .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-faint);
  }
  .kpi .value {
    font-family: 'VT323', monospace;
    font-size: 30px;
    color: var(--text);
    line-height: 1.1;
    margin-top: 4px;
  }

  /* TABS */
  .tabs {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 8px 0 12px;
    margin: 0 -2px 12px;
    z-index: 5;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs-inner {
    display: flex;
    gap: 6px;
    padding: 0 2px;
    width: max-content;
  }
  .tab {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 9px 16px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    -webkit-appearance: none;
  }
  .tab.active {
    background: var(--accent);
    color: #0d1117;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* PANELS */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin: 0 0 12px;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .chart-wrap { position: relative; height: 200px; }

  .list-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    gap: 12px;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row .main { flex: 1; min-width: 0; }
  .list-row .main > div:first-child { color: var(--text); }
  .list-row .meta {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .list-row .amount {
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }

  .compact-list .list-row {
    flex-wrap: wrap;
    gap: 4px 12px;
  }

  /* Clickable rows */
  .list-row.clickable {
    cursor: pointer;
    transition: background 0.1s;
    margin: 0 -16px;
    padding-left: 16px;
    padding-right: 16px;
  }
  .list-row.clickable:active {
    background: var(--bg-panel-2);
  }
  .list-row.clickable:hover {
    background: var(--bg-panel-2);
  }

  /* Minecraft item icons */
  .item-icon {
    width: 24px;
    height: 24px;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    flex-shrink: 0;
    vertical-align: middle;
    margin-right: 8px;
  }
  .item-icon.large {
    width: 32px;
    height: 32px;
  }

  /* Minecraft head avatars */
  .mc-head {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    border-radius: 4px;
    background: var(--bg-panel-2);
  }
  .mc-head.large {
    width: 80px;
    height: 80px;
    border-radius: 8px;
  }
  .list-row .mc-head {
    margin-right: 4px;
  }

  /* Profile view */
  .profile-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 14px;
    -webkit-appearance: none;
  }
  .profile-back:active { background: var(--bg-panel-2); }

  .profile-header {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 18px;
    margin-bottom: 14px;
    text-align: center;
  }
  .profile-header .avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #0d1117;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'VT323', monospace;
    font-size: 32px;
    margin-bottom: 10px;
  }
  .profile-header .name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    color: var(--text);
    font-weight: 700;
  }
  .profile-header .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .trend-up { color: var(--accent-2); }
  .trend-down { color: var(--danger); }
  .trend-flat { color: var(--text-faint); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
  }
  .badge.dead { background: rgba(248, 81, 73, 0.15); color: var(--danger); }
  .badge.slow { background: rgba(210, 153, 34, 0.15); color: var(--warn); }
  .badge.hot { background: rgba(94, 196, 108, 0.15); color: var(--accent-2); }
  .badge.vip { background: rgba(255, 209, 102, 0.18); color: var(--accent); }
  .badge.new { background: rgba(88, 166, 255, 0.18); color: var(--info); }
  .badge.regular { background: rgba(94, 196, 108, 0.15); color: var(--accent-2); }
  .badge.churned { background: rgba(110, 118, 129, 0.25); color: var(--text-dim); }
  .badge.custom { background: rgba(255, 209, 102, 0.12); color: var(--accent); cursor: pointer; }
  .badge.custom .x { margin-left: 4px; opacity: 0.6; }
  .badge.custom:hover .x { opacity: 1; }

  /* Tags row */
  .tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .tag-add {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-faint);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Notes textarea */
  .notes-area {
    width: 100%;
    min-height: 70px;
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    resize: vertical;
  }
  .notes-area:focus { outline: none; border-color: var(--accent); }
  .save-hint {
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .save-hint.saved { color: var(--accent-2); }

  /* Price advice cards */
  .advice-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .advice-card.raise { background: rgba(94, 196, 108, 0.08); border: 1px solid rgba(94, 196, 108, 0.25); }
  .advice-card.lower { background: rgba(210, 153, 34, 0.08); border: 1px solid rgba(210, 153, 34, 0.25); }
  .advice-card.hold  { background: rgba(110, 118, 129, 0.08); border: 1px solid var(--border); }
  .advice-card .label { font-weight: 700; color: var(--text); margin-bottom: 3px; font-size: 13px; }
  .advice-card .reason { color: var(--text-dim); font-size: 11px; }
  .advice-card .arrow { font-size: 22px; font-weight: 700; }
  .advice-card.raise .arrow { color: var(--accent-2); }
  .advice-card.lower .arrow { color: var(--warn); }
  .advice-card.hold  .arrow { color: var(--text-faint); }

  /* Today panel - hero style */
  .today-hero {
    background: linear-gradient(135deg, rgba(255, 209, 102, 0.1), rgba(94, 196, 108, 0.06));
    border: 1px solid rgba(255, 209, 102, 0.25);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
  }
  .today-hero .title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .today-hero .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
  }
  .today-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin: 14px 0 10px;
  }
  .today-stat {
    text-align: center;
  }
  .today-stat .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-faint);
  }
  .today-stat .num {
    font-family: 'VT323', monospace;
    font-size: 28px;
    color: var(--text);
    line-height: 1.1;
    margin-top: 2px;
  }
  .today-stat .vs {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    margin-top: 2px;
  }

  /* Comparison metric cards */
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .compare-card {
    background: var(--bg-panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .compare-card .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-faint);
    margin-bottom: 2px;
  }
  .compare-card .current {
    font-family: 'VT323', monospace;
    font-size: 26px;
    line-height: 1.1;
    color: var(--text);
  }
  .compare-card .prev {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 4px;
  }
  .compare-card .delta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    margin-top: 4px;
  }
  .compare-card .delta.up { color: var(--accent-2); }
  .compare-card .delta.down { color: var(--danger); }
  .compare-card .delta.flat { color: var(--text-faint); }

  /* Record cards */
  .record-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .record-card:last-child { border-bottom: none; }
  .record-card .icon {
    font-size: 24px;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }
  .record-card .info { flex: 1; min-width: 0; }
  .record-card .info .title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-faint);
  }
  .record-card .info .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    margin-top: 2px;
  }
  .record-card .info .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 2px;
  }

  .heatmap {
    display: grid;
    grid-template-columns: 32px repeat(24, 1fr);
    gap: 1.5px;
    font-size: 8px;
    color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
  }
  .heatmap .cell {
    aspect-ratio: 1;
    border-radius: 2px;
    background: rgba(255, 209, 102, 0.04);
  }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }
  .empty-state .ascii {
    font-family: 'VT323', monospace;
    font-size: 56px;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .meta-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 14px;
    padding: 0 2px;
  }

  @media (min-width: 768px) {
    body { padding: 24px 28px 80px; }
    .container { max-width: 880px; }
    .logo { font-size: 36px; }
    .kpi-grid { grid-template-columns: repeat(4, 1fr); }
    .kpi .value { font-size: 36px; }
    .chart-wrap { height: 260px; }
    .heatmap { grid-template-columns: 40px repeat(24, 1fr); font-size: 10px; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo">QS<span>·INSIGHTS</span></div>
    <button id="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </header>

  <div class="meta-bar">
    <span id="dateRange">no data</span>
    <span id="lastUpdated">—</span>
  </div>

  <div class="kpi-grid">
    <div class="kpi">
      <div class="label">Revenue</div>
      <div class="value" id="totalRev">$0</div>
    </div>
    <div class="kpi">
      <div class="label">Transactions</div>
      <div class="value" id="totalTx">0</div>
    </div>
    <div class="kpi">
      <div class="label">Buyers</div>
      <div class="value" id="totalBuyers">0</div>
    </div>
    <div class="kpi">
      <div class="label">Avg sale</div>
      <div class="value" id="avgSale">$0</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tabs-inner">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="items">Items</button>
      <button class="tab" data-tab="customers">Customers</button>
      <button class="tab" data-tab="activity">Activity</button>
      <button class="tab" data-tab="recent">Recent</button>
    </div>
  </div>

  <main id="dashboard">
    <div class="panel">
      <div class="empty-state">
        <div class="ascii">[ ⛏ ]</div>
        <p>Loading shop history...</p>
      </div>
    </div>
  </main>

</div>

<script>
  let transactions = [];
  let charts = {};
  let activeTab = 'overview';

  // ===== MINECRAFT AVATARS =====
  // mc-heads.net: free, fast, CORS-friendly, no key needed.
  // Falls back to a letter avatar if image fails to load.
  function mcHeadUrl(buyerName, size = 64) {
    // Sanitize: alphanumeric + underscore only (valid MC usernames)
    const clean = buyerName.replace(/[^a-zA-Z0-9_]/g, '');
    if (!clean) return null;
    return `https://mc-heads.net/avatar/${encodeURIComponent(clean)}/${size}`;
  }

  function avatarImg(buyerName, sizeClass = '') {
    const url = mcHeadUrl(buyerName, sizeClass === 'large' ? 160 : 64);
    if (!url) {
      // Show letter fallback
      return `<div class="avatar ${sizeClass}" style="display:inline-flex; width: ${sizeClass === 'large' ? 80 : 32}px; height: ${sizeClass === 'large' ? 80 : 32}px; border-radius: ${sizeClass === 'large' ? 8 : 4}px; background: var(--accent); color: #0d1117; align-items: center; justify-content: center; font-family: 'VT323', monospace; font-size: ${sizeClass === 'large' ? 40 : 18}px;">${buyerName.charAt(0).toUpperCase()}</div>`;
    }
    const initial = buyerName.charAt(0).toUpperCase();
    return `<img class="mc-head ${sizeClass}"
      src="${url}"
      loading="lazy"
      alt="${buyerName}"
      onerror="this.outerHTML='<div class=\\'mc-head ${sizeClass}\\' style=\\'display:inline-flex; background: var(--accent); color: #0d1117; align-items: center; justify-content: center; font-family: VT323, monospace; font-size: ${sizeClass === 'large' ? 40 : 18}px;\\'>${initial}</div>'" />`;
  }

  // ===== ITEM ICONS =====
  // jsDelivr serves PNG textures from InventivetalentDev/minecraft-assets repo.
  // URL: cdn.jsdelivr.net/gh/USER/REPO@BRANCH/path
  // Most items live under textures/item/, some under textures/block/.
  const MC_VERSION = '1.21';
  const ICON_BASE = `https://cdn.jsdelivr.net/gh/InventivetalentDev/minecraft-assets@${MC_VERSION}/assets/minecraft/textures`;

  const ITEM_SLUG_OVERRIDES = {
    // Wood / planks shortcuts
    'wood': 'oak_log',
    'log': 'oak_log',
    'plank': 'oak_planks',
    'planks': 'oak_planks',

    // Items with names that don't match Minecraft's internal IDs
    'redstone_dust': 'redstone',
    'redstone': 'redstone',
    'glowstone_dust': 'glowstone_dust',
    'sugar_cane': 'sugar_cane',
    'cocoa_beans': 'cocoa_beans',
    'ink_sac': 'ink_sac',

    // Slabs use the parent block texture (slabs have no item-specific texture)
    'sandstone_slab': 'sandstone',
    'stone_slab': 'stone',
    'cobblestone_slab': 'cobblestone',
    'oak_slab': 'oak_planks',
    'birch_slab': 'birch_planks',
    'spruce_slab': 'spruce_planks',
    'dark_oak_slab': 'dark_oak_planks',
    'jungle_slab': 'jungle_planks',
    'acacia_slab': 'acacia_planks',
    'smooth_stone_slab': 'smooth_stone',
    'quartz_slab': 'quartz_block_side',

    // Stairs use parent block texture
    'sandstone_stairs': 'sandstone',
    'stone_stairs': 'stone',
    'cobblestone_stairs': 'cobblestone',
    'oak_stairs': 'oak_planks',
  };

  function resolveItemSlug(itemName) {
    if (!itemName) return '';
    const base = itemName.toLowerCase().trim();
    const key = base.replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
    if (ITEM_SLUG_OVERRIDES[key]) return ITEM_SLUG_OVERRIDES[key];
    return key;
  }

  function itemIcon(itemName, size = 24) {
    if (!itemName) return '';
    const slug = resolveItemSlug(itemName);
    if (!slug) return '';
    const itemUrl = `${ICON_BASE}/item/${slug}.png`;
    const blockUrl = `${ICON_BASE}/block/${slug}.png`;
    // First try item path. On error, switch to block path. On second error,
    // hide the broken image but keep the layout space.
    return `<img class="item-icon"
      src="${itemUrl}"
      loading="lazy"
      alt=""
      width="${size}"
      height="${size}"
      onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='${blockUrl}';}else{this.style.visibility='hidden';}"
    />`;
  }

  // ===== STORAGE UTILITIES =====
  function loadStorage(key, fallback) {
    try {

  // ===== AUTO-TAG LOGIC =====
  function autoTagsFor(buyerName, txs) {
    const tags = [];
    if (!txs.length) return tags;
    const total = txs.reduce((s, t) => s + t.net, 0);
    const sorted = [...txs].sort((a, b) => new Date(a.time) - new Date(b.time));
    const first = new Date(sorted[0].time);
    const last = new Date(sorted[sorted.length - 1].time);
    const daysSinceFirst = (Date.now() - first.getTime()) / 86400000;
    const daysSinceLast = (Date.now() - last.getTime()) / 86400000;

    if (total >= 1000) tags.push({ type: 'vip', label: '⭐ VIP' });
    if (daysSinceFirst < 7) tags.push({ type: 'new', label: '🆕 New' });
    if (txs.length >= 5 && daysSinceLast <= 7) tags.push({ type: 'regular', label: '🔁 Regular' });
    if (daysSinceLast > 14 && txs.length >= 3) tags.push({ type: 'churned', label: '👻 Churned' });

    return tags;
  }

  // ===== PRICE ADVISOR =====
  function priceAdvice(itemStats) {
    // itemStats: { item, qty, revenue, count, lastSale, daysSince }
    // Heuristics:
    // - Very high velocity + many big-quantity transactions = probably underpriced
    // - Very slow + days since last sale > 14 = probably overpriced
    // - Otherwise hold
    const daysSinceLast = itemStats.daysSince;
    const totalQty = itemStats.qty;
    const txCount = itemStats.count;
    const avgQtyPerTx = totalQty / Math.max(1, txCount);

    // Calc sales velocity: qty per day over last 14 days
    const cutoff = Date.now() - 14 * 86400000;
    const recent = transactions.filter(t =>
      t.item === itemStats.item && new Date(t.time).getTime() >= cutoff
    );
    const recentQty = recent.reduce((s, t) => s + t.qty, 0);
    const velocity = recentQty / 14; // per day

    if (daysSinceLast > 21) {
      return {
        action: 'lower', arrow: '↓',
        label: `Drop ${itemStats.item} price 20-30%`,
        reason: `No sales in ${daysSinceLast}d — likely too expensive`,
      };
    }
    if (daysSinceLast > 7 && txCount < 3) {
      return {
        action: 'lower', arrow: '↓',
        label: `Try lowering ${itemStats.item} ~15%`,
        reason: `Slow movement: ${txCount} sales total, last ${daysSinceLast}d ago`,
      };
    }
    if (velocity >= 8 && avgQtyPerTx >= 16) {
      return {
        action: 'raise', arrow: '↑',
        label: `Try raising ${itemStats.item} 10-15%`,
        reason: `Hot: ${velocity.toFixed(1)}/day, buyers grab ${Math.round(avgQtyPerTx)}+ at a time`,
      };
    }
    if (velocity >= 3 && txCount >= 8) {
      return {
        action: 'raise', arrow: '↑',
        label: `Test +5-10% on ${itemStats.item}`,
        reason: `Steady demand: ${velocity.toFixed(1)} sold/day across ${txCount} sales`,
      };
    }
    return null;
  }

    try {

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = parseCSVLine(lines[0]);
    return lines.slice(1).map(line => {
      const vals = parseCSVLine(line);
      const o = {};
      headers.forEach((h, i) => o[h.trim()] = vals[i] || '');
      const net = parseFloat(o.net) || 0;
      // Gross is the pre-tax amount. If not in CSV, derive from net assuming 1% tax.
      let gross = parseFloat(o.gross);
      let tax = parseFloat(o.tax);
      if (!gross || isNaN(gross)) {
        gross = net / 0.99;
        tax = gross - net;
      }
      return {
        time: o.time,
        buyer: o.buyer,
        item: o.item,
        qty: parseInt(o.quantity) || 1,
        net: net,
        gross: gross,
        tax: tax || 0,
        shop: o.shop || 'unknown'
      };
    }).filter(t => t.time && t.buyer && t.item);
  }

  function parseCSVLine(line) {
    const result = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQuotes = !inQuotes; continue; }
      if (c === ',' && !inQuotes) { result.push(cur); cur = ''; continue; }
      cur += c;
    }
    result.push(cur);
    return result;
  }

    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!touchStartX) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 60 && Math.abs(dy) < 50) {
      const idx = tabOrder.indexOf(activeTab);
      if (dx < 0 && idx < tabOrder.length - 1) {
        document.querySelector(`.tab[data-tab="${tabOrder[idx+1]}"]`).click();
      } else if (dx > 0 && idx > 0) {
        document.querySelector(`.tab[data-tab="${tabOrder[idx-1]}"]`).click();

  function formatRelativeDate(iso) {
    const d = new Date(iso);
    const days = Math.floor((Date.now() - d.getTime()) / 86400000);
    const time = d.toTimeString().slice(0,5);
    if (days === 0) return `today ${time}`;
    if (days === 1) return `yesterday ${time}`;
    if (days < 7) return `${days}d ago ${time}`;
    return d.toISOString().slice(0,10);
  }

  // ===== CUSTOMER PROFILE =====
  function showCustomerProfile(buyerName) {
    const txs = transactions.filter(t => t.buyer === buyerName)
      .sort((a, b) => new Date(a.time) - new Date(b.time));
    if (!txs.length) return;

    const totalSpent = txs.reduce((s, t) => s + t.net, 0);
    const avgSpend = totalSpent / txs.length;
    const firstPurchase = new Date(txs[0].time);
    const lastPurchase = new Date(txs[txs.length - 1].time);
    const daysActive = Math.max(1, Math.round((lastPurchase - firstPurchase) / 86400000));

    // Items they buy
    const itemMap = {};
    txs.forEach(t => {
      if (!itemMap[t.item]) itemMap[t.item] = { item: t.item, qty: 0, revenue: 0, count: 0 };
      itemMap[t.item].qty += t.qty;
      itemMap[t.item].revenue += t.net;
      itemMap[t.item].count += 1;
    });
    const topItems = Object.values(itemMap).sort((a, b) => b.revenue - a.revenue);

    // Hour pattern
    const hourly = Array(24).fill(0);
    txs.forEach(t => hourly[new Date(t.time).getHours()]++);

    // Region guess based on when they shop
    // Timestamps are Europe/Amsterdam. We look at WHICH local hours they
    // prefer, then map back to "evening" in different continents.
    // Evening hours (18-23 local) for each region map back to Amsterdam as:
    //   Europe:        18-23 AMS (same)
    //   Americas:      00-05 AMS (US night = AMS early morning)
    //                  midpoint US: -7h → 18-23 local = 01-06 AMS
    //   Asia/Oceania:  10-15 AMS (Asia evening = AMS midday)
    //                  midpoint +6h → 18-23 local = 12-17 AMS
    function regionGuess(hours, totalTx) {
      if (totalTx < 5) {
        return { label: 'Unclear', detail: 'too few purchases', conf: 'low' };
      }
      // Sum activity in each region's "evening window" (Amsterdam time)
      const inRange = (h, start, end) => {
        // Handle wrap-around windows
        if (start <= end) return h >= start && h <= end;
        return h >= start || h <= end;
      };
      const windows = {
        Europe:        { range: [16, 23], label: 'Europe' },
        Americas:      { range: [22,  6], label: 'Americas' },
        'Asia/Oceania':{ range: [ 9, 16], label: 'Asia / Oceania' },
      };
      const scores = {};
      for (const [key, w] of Object.entries(windows)) {
        let sum = 0;
        for (let h = 0; h < 24; h++) {
          if (inRange(h, w.range[0], w.range[1])) sum += hours[h];
        }
        scores[key] = sum;
      }
      // Find top region
      const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      const [topKey, topScore] = sorted[0];
      const [_, secondScore] = sorted[1];

      // Confidence: how dominant is the top region?
      const share = topScore / totalTx;
      if (share < 0.5) {
        return { label: 'Unclear', detail: 'mixed hours', conf: 'low' };
      }
      // If top and runner-up are close, it's ambiguous
      const margin = (topScore - secondScore) / Math.max(1, totalTx);
      if (margin < 0.15) {
        return { label: 'Unclear', detail: 'overlapping windows', conf: 'low' };
      }
      const conf = share >= 0.75 ? 'high' : 'medium';
      return {
        label: windows[topKey].label,
        detail: `${Math.round(share * 100)}% of buys in ${topKey} evening hours`,
        conf,
      };
    }
    const region = regionGuess(hourly, txs.length);
    const regionEmoji = {
      'Europe': '🇪🇺',
      'Americas': '🌎',
      'Asia / Oceania': '🌏',
      'Unclear': '🌐',
    }[region.label] || '🌐';

    // Trend: split into two halves of the active period
    const midpoint = new Date((firstPurchase.getTime() + lastPurchase.getTime()) / 2);
    const firstHalf = txs.filter(t => new Date(t.time) <= midpoint);
    const secondHalf = txs.filter(t => new Date(t.time) > midpoint);
    const firstHalfRev = firstHalf.reduce((s, t) => s + t.net, 0);
    const secondHalfRev = secondHalf.reduce((s, t) => s + t.net, 0);
    let trendLabel, trendClass;

              </div>

              <div class="meta">${formatRelativeDate(t.time)} · ${t.shop}</div>
            </div>
            <div class="amount">$${t.net.toLocaleString(undefined,{maximumFractionDigits:2})}</div>
          </div>`).join('')}
      </div>
    `;

    // Render hour chart
    Object.values(charts).forEach(c => c?.destroy?.());
    charts = {};
    charts.profileHour = new Chart(document.getElementById('profileHourChart'), {
      type: 'bar',
      data: {
        labels: Array.from({length:24}, (_,i)=>i),
        datasets: [{ data: hourly, backgroundColor: '#ffd166', borderRadius: 2 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#6e7681', font: { family: 'JetBrains Mono', size: 9 } }, grid: { display: false } },
          y: { beginAtZero: true, ticks: { color: '#6e7681', font: { family: 'JetBrains Mono', size: 9 }, stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });

    // Scroll to top so the profile is visible
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ===== SHOP PROFILE =====
  function showShopProfile(shopId) {
    const txs = transactions.filter(t => t.shop === shopId)
      .sort((a, b) => new Date(a.time) - new Date(b.time));
    if (!txs.length) return;

    const totalRev = txs.reduce((s, t) => s + t.net, 0);
    const totalQty = txs.reduce((s, t) => s + t.qty, 0);
    const avgSale = totalRev / txs.length;
    const firstSale = new Date(txs[0].time);
    const lastSale = new Date(txs[txs.length - 1].time);
    const daysActive = Math.max(1, Math.round((lastSale - firstSale) / 86400000));
    const daysSinceLast = Math.floor((Date.now() - lastSale.getTime()) / 86400000);

    // Items sold here
    const itemMap = {};
    txs.forEach(t => {
      if (!itemMap[t.item]) itemMap[t.item] = { item: t.item, qty: 0, revenue: 0, count: 0 };
      itemMap[t.item].qty += t.qty;
      itemMap[t.item].revenue += t.net;
      itemMap[t.item].count += 1;
    });
    const items = Object.values(itemMap).sort((a, b) => b.revenue - a.revenue);
    const topItem = items[0].item;

    // Top customers of THIS shop
    const buyerMap = {};
    txs.forEach(t => {
      if (!buyerMap[t.buyer]) buyerMap[t.buyer] = { buyer: t.buyer, revenue: 0, count: 0 };
      buyerMap[t.buyer].revenue += t.net;
      buyerMap[t.buyer].count += 1;
    });
    const buyers = Object.values(buyerMap).sort((a, b) => b.revenue - a.revenue);

    // Hour pattern
    const hourly = Array(24).fill(0);
    txs.forEach(t => hourly[new Date(t.time).getHours()]++);

    // Velocity over last 14 days for this shop
    const cutoff = Date.now() - 14 * 86400000;
    const recent = txs.filter(t => new Date(t.time).getTime() >= cutoff);
    const recentRev = recent.reduce((s, t) => s + t.net, 0);
    const velocityPerDay = recent.length / 14;

    // Parse coords for display
    const coordMatch = shopId.match(/(-?\d+)[\s,]+(-?\d+)[\s,]+(-?\d+)/);
    const coords = coordMatch ? `${coordMatch[1]}, ${coordMatch[2]}, ${coordMatch[3]}` : shopId;
    const isMixed = items.length > 1 && items[1].count / items[0].count > 0.5;
    const shopName = isMixed ? `Mixed shop` : topItem;

    const lastSeenLabel = daysSinceLast === 0 ? 'today'
      : daysSinceLast === 1 ? 'yesterday'
      : `${daysSinceLast}d ago`;

    const dash = document.getElementById('dashboard');
    dash.innerHTML = `
      <button class="profile-back" onclick="backToOverview()">← Back to overview</button>

      <div class="profile-header">
        <div style="font-size: 56px; line-height: 1;">🏪</div>
        <div class="name" style="margin-top: 6px;">${shopName}</div>
        <div class="subtitle">@ ${coords}</div>
        <div class="subtitle" style="margin-top: 4px;">active since ${firstSale.toISOString().slice(0,10)}</div>
      </div>

      <div class="kpi-grid">
        <div class="kpi">
          <div class="label">Revenue</div>
          <div class="value">$${totalRev.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
        </div>
        <div class="kpi">
          <div class="label">Sales</div>
          <div class="value">${txs.length}</div>
        </div>
        <div class="kpi">
          <div class="label">Units sold</div>
          <div class="value">${totalQty.toLocaleString()}</div>
        </div>
        <div class="kpi">
          <div class="label">Last sale</div>
          <div class="value" style="font-size: 22px; padding-top: 8px;">${lastSeenLabel}</div>
        </div>
      </div>

      <div class="panel">
        <h3 class="panel-title">Performance</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px;">
          <div>
            <div style="color: var(--text-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 1px;">Velocity</div>
            <div style="font-size: 18px; color: var(--text); margin-top: 4px;">${velocityPerDay.toFixed(1)} <span style="font-size: 11px; color: var(--text-faint);">sales/day</span></div>
            <div style="color: var(--text-faint); font-size: 10px; margin-top: 4px;">last 14 days</div>
          </div>
          <div>
            <div style="color: var(--text-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 1px;">Avg sale</div>
            <div style="font-size: 18px; color: var(--text); margin-top: 4px;">$${avgSale.toFixed(2)}</div>
            <div style="color: var(--text-faint); font-size: 10px; margin-top: 4px;">all-time</div>
          </div>
          <div>
            <div style="color: var(--text-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 1px;">Last 14d</div>
            <div style="font-size: 18px; color: var(--text); margin-top: 4px;">$${recentRev.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
            <div style="color: var(--text-faint); font-size: 10px; margin-top: 4px;">${recent.length} sales</div>
          </div>
          <div>
            <div style="color: var(--text-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 1px;">Unique buyers</div>
            <div style="font-size: 18px; color: var(--text); margin-top: 4px;">${buyers.length}</div>
            <div style="color: var(--text-faint); font-size: 10px; margin-top: 4px;">over ${daysActive} days</div>
          </div>
        </div>
        ${(() => {
          const grossTotal = txs.reduce((s, t) => s + t.gross, 0);
          const taxTotal = txs.reduce((s, t) => s + t.tax, 0);
          return `
            <div style="border-top: 1px solid var(--border); padding-top: 12px; margin-top: 14px; display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 11px;">
              <div>
                <div style="color: var(--text-faint); font-size: 9px; text-transform: uppercase;">Buyers paid</div>
                <div style="color: var(--text); margin-top: 2px;">$${grossTotal.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
              </div>
              <div>
                <div style="color: var(--text-faint); font-size: 9px; text-transform: uppercase;">Tax</div>
                <div style="color: var(--warn); margin-top: 2px;">$${taxTotal.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
              </div>
              <div>
                <div style="color: var(--text-faint); font-size: 9px; text-transform: uppercase;">You got</div>
                <div style="color: var(--accent-2); margin-top: 2px;">$${totalRev.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
              </div>
            </div>
          `;
        })()}
      </div>

      ${items.length > 1 ? `
        <div class="panel">
          <h3 class="panel-title">Items sold here</h3>
          ${items.map(i => `
            <div class="list-row">
              ${itemIcon(i.item, 24)}
              <div class="main">
                <div>${i.item}</div>
                <div class="meta">${i.qty} units · ${i.count} sales</div>
              </div>
              <div class="amount">$${i.revenue.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
            </div>`).join('')}
        </div>` : ''}

      <div class="panel">
        <h3 class="panel-title">Top customers at this shop</h3>
        ${buyers.slice(0, 8).map(b => `
          <div class="list-row clickable" onclick="showCustomerProfile('${b.buyer.replace(/'/g, "\\'")}')">
            ${avatarImg(b.buyer)}
            <div class="main">
              <div>${b.buyer}</div>
              <div class="meta">${b.count} purchase${b.count === 1 ? '' : 's'}</div>
            </div>
            <div class="amount">$${b.revenue.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
            <div style="color: var(--text-faint); font-size: 14px; margin-left: 4px;">›</div>
          </div>`).join('')}
      </div>

      <div class="panel">
        <h3 class="panel-title">Sales pattern · hour of day</h3>
        <div class="chart-wrap"><canvas id="shopHourChart"></canvas></div>
      </div>

      <div class="panel">
        <h3 class="panel-title">Recent sales (${Math.min(20, txs.length)} of ${txs.length})</h3>
        ${[...txs].reverse().slice(0, 20).map(t => `
          <div class="list-row">
            ${itemIcon(t.item, 24)}
            <div class="main">
              <div>${t.buyer} · ${t.qty}× ${t.item}</div>
              <div class="meta">${formatRelativeDate(t.time)}</div>
            </div>
            <div class="amount">$${t.net.toLocaleString(undefined,{maximumFractionDigits:2})}</div>
          </div>`).join('')}
      </div>
    `;

    Object.values(charts).forEach(c => c?.destroy?.());
    charts = {};
    charts.shopHour = new Chart(document.getElementById('shopHourChart'), {
      type: 'bar',
      data: {
        labels: Array.from({length:24}, (_,i)=>i),
        datasets: [{ data: hourly, backgroundColor: '#ffd166', borderRadius: 2 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#6e7681', font: { family: 'JetBrains Mono', size: 9 } }, grid: { display: false } },
          y: { beginAtZero: true, ticks: { color: '#6e7681', font: { family: 'JetBrains Mono', size: 9 }, stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function backToOverview() {
    render();
    const overviewTab = document.querySelector('.tab[data-tab="overview"]');
    if (overviewTab) overviewTab.click();
  }

  // ===== TAG & NOTE MANAGEMENT =====
  function backToCustomers() {
    render();
    // After re-rendering, activate the Customers tab
    const customersTab = document.querySelector('.tab[data-tab="customers"]');
    if (customersTab) customersTab.click();
  }

  function addCustomerTag(buyerName) {
    const tag = prompt('Add a tag (short label):');
    if (!tag) return;
    const trimmed = tag.trim().slice(0, 20);
    if (!trimmed) return;
    const data = getCustomerData(buyerName);
    data.tags = data.tags || [];
    if (!data.tags.includes(trimmed)) {
      data.tags.push(trimmed);
      setCustomerData(buyerName, data);
    }
    showCustomerProfile(buyerName);
  }

  function removeCustomerTag(buyerName, idx) {
    const data = getCustomerData(buyerName);
    data.tags = (data.tags || []).filter((_, i) => i !== idx);
    setCustomerData(buyerName, data);
    showCustomerProfile(buyerName);
  }

  let noteSaveTimer = null;
  function saveCustomerNote(buyerName, value) {
    const hint = document.getElementById('notes-save-hint');
    if (hint) {
      hint.textContent = 'saving...';
      hint.classList.remove('saved');
    }
    clearTimeout(noteSaveTimer);
    noteSaveTimer = setTimeout(() => {
      const data = getCustomerData(buyerName);
      data.notes = value;
      setCustomerData(buyerName, data);
      if (hint) {
        hint.textContent = '✓ saved';
        hint.classList.add('saved');
      }
    }, 400);
  }

  loadData();
</script>
</body>
</html>
